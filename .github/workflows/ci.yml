# CI Workflow - Python backend tests + Frontend lint/build
# Runs on every PR and push to main
# Tests MUST pass before deployment

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deployment-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate production Docker and deployment config
        run: |
          {
            echo UID=1000
            echo GID=1000
            echo JOB_USER_EMAIL=ci@example.com
          } > .env
          ./scripts/validate_prod_config.sh

      - name: Validate production scripts
        run: |
          bash -n scripts/prod_smoke_check.sh
          bash -n scripts/prod_monitor.sh
          bash -n scripts/prod_monitor_cron.sh
          bash -n scripts/install_prod_monitor_cron.sh
          bash -n scripts/validate_prod_config.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Lint with Ruff
        run: |
          pip install ruff
          # Focus on critical errors: undefined names, assertion issues, syntax errors
          # Skip style warnings to avoid blocking on pre-existing issues
          ruff check . --output-format=github --select=F63,F7,F82

      - name: Check Config singleton usage
        run: |
          # Fail if Config() is called anywhere except settings.py and test files
          # Config should be used as a singleton, not instantiated with Config()
          if grep -rn --include="*.py" "Config()" . | grep -v "settings.py" | grep -v "tests/" | grep -v "__pycache__"; then
            echo "ERROR: Config() should not be called outside of settings.py and tests/"
            echo "Use the Config singleton directly instead of calling Config()"
            exit 1
          fi
          echo "Config singleton usage check passed"

      - name: Run unit tests
        run: |
          # Run unit tests that don't require external services
          pytest tests/test_utils.py tests/test_settings.py tests/test_postgres_schema.py tests/test_api_integration.py tests/test_task_queue.py -v --tb=short
        env:
          # Minimal env vars for Config to load
          AIRTABLE_PAT: "fake_for_testing"
          AIRTABLE_BASE_ID: "fake_base"
          AIRTABLE_TABLE_ID: "fake_table"
          AIRTABLE_TABLE_ID_HISTORY: "fake_history"
          AIRTABLE_TABLE_ID_USER_CONFIGS: "fake_configs"
          AIRTABLE_TABLE_ID_CV_VERSIONS: "fake_versions"
          AZURE_AI_ENDPOINT: "https://fake.openai.azure.com"
          AZURE_AI_API_KEY: "fake_key"
          AZURE_DEPLOYMENT: "fake_deployment"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          fail_ci_if_error: false
        continue-on-error: true

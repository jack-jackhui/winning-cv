services:
  # =============================================================================
  # Frontend - React SPA served by Nginx
  # =============================================================================
  frontend:
    image: ghcr.io/jack-jackhui/winning-cv:frontend
    container_name: winning-cv-frontend
    restart: unless-stopped
    ports:
      - "13001:80"  # Only frontend exposed externally
    volumes:
      # Use repo-managed nginx config with Docker DNS resolver + variable proxy_pass
      # so API/MinIO service IPs are re-resolved after container recreation.
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - winningcv-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # =============================================================================
  # FastAPI Backend - Internal only (accessed via nginx proxy)
  # =============================================================================
  api:
    image: ghcr.io/jack-jackhui/winning-cv:latest
    container_name: winning-cv-api
    restart: unless-stopped
    # NO external ports - accessed via frontend nginx proxy
    volumes:
      - ./user_cv:/winning-cv/user_cv
      - cv_data:/winning-cv/customised_cv
      - ./cookies:/winning-cv/cookies  # LinkedIn session cookies
    environment:
      - API_PORT=8000
      - API_HOST=0.0.0.0
      - API_RELOAD=false
      - API_WORKERS=1
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - CHROMIUM_PATH=/usr/bin/chromium
      - HEADLESS=true
      - RUNNING_IN_DOCKER=true
      - HOME=/tmp/chrome-home
      - XDG_CONFIG_HOME=/tmp/chrome-config
      - MINIO_ENDPOINT=minio:9000
      - MINIO_SECURE=false
    env_file:
      - .env
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "run_api.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - winningcv-net

  # =============================================================================
  # CLI Job Runner - For cronjob execution
  # =============================================================================
  job-runner:
    image: ghcr.io/jack-jackhui/winning-cv:latest
    restart: "no"
    volumes:
      - ./user_cv:/winning-cv/user_cv
      - cv_data:/winning-cv/customised_cv
      - ./cookies:/winning-cv/cookies  # LinkedIn session cookies
    environment:
      - CHROMIUM_PATH=/usr/bin/chromium
      - HEADLESS=true
      - RUNNING_IN_DOCKER=true
      - HOME=/tmp/chrome-home
      - XDG_CONFIG_HOME=/tmp/chrome-config
      - MINIO_ENDPOINT=minio:9000
      - MINIO_SECURE=false
    env_file:
      - .env
    command: ["python", "main.py", "--user-email", "${JOB_USER_EMAIL}"]
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - winningcv-net
    profiles:
      - cli  # Only run when explicitly requested: docker compose --profile cli run job-runner

  # =============================================================================
  # Background Worker - Processes queued async tasks
  # =============================================================================
  worker:
    image: ghcr.io/jack-jackhui/winning-cv:latest
    container_name: winning-cv-worker
    restart: unless-stopped
    volumes:
      - ./user_cv:/winning-cv/user_cv
      - cv_data:/winning-cv/customised_cv
      - ./cookies:/winning-cv/cookies  # LinkedIn session cookies
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - CHROMIUM_PATH=/usr/bin/chromium
      - HEADLESS=true
      - RUNNING_IN_DOCKER=true
      - HOME=/tmp/chrome-home
      - XDG_CONFIG_HOME=/tmp/chrome-config
      - MINIO_ENDPOINT=minio:9000
      - MINIO_SECURE=false
    env_file:
      - .env
    command: ["python", "run_worker.py", "--worker-id", "prod-worker-1", "--poll-interval", "5"]
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - winningcv-net

  # =============================================================================
  # MinIO Object Storage - Internal only
  # =============================================================================
  minio:
    image: minio/minio:latest
    container_name: winning-cv-minio
    restart: unless-stopped
    # NO external ports - internal only
    # Uncomment below for admin console access (localhost only)
    # ports:
    #   - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - winningcv-net

  # =============================================================================
  # MinIO Bucket Initialization
  # =============================================================================
  minio-init:
    image: minio/mc:latest
    container_name: winning-cv-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb myminio/winningcv-cvs --ignore-existing;
      mc anonymous set none myminio/winningcv-cvs;
      echo 'MinIO bucket initialized successfully';
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin123}
    networks:
      - winningcv-net

# =============================================================================
# PostgreSQL - CV Knowledge Base
# =============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: winning-cv-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=winningcv
      - POSTGRES_DB=winningcv
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-winningcv_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winningcv -d winningcv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - winningcv-net

# =============================================================================
# Networks
# =============================================================================
networks:
  winningcv-net:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  cv_data:
  minio_data:
  postgres_data:
